type Query {
	labHello: String

	# String, Int, Float, Boolean, ID
	# [String] array of Strings, optionally
	# [String!] array that requires strings (could still be empty)
	#           and could be null!
	# [String!]! must return an array (no nulls), must have strings
	#            if it has any values (empty array allowed)
	userEmails: [String!]!
	users: [User]
	payments: [Payment]
}

type Location {
	city: String
	province: String
	country: String
	postalCode: String
}

type User {
	id: Int!
	firstName: String
	lastName: String
	email: String
	userId: String
	location: Location
}

type Payment {
	id: Int
	sender: String
	senderDetails: User
	recipient: String
	datePaid: String
	amount: Float
	localeAmount: String
	reason: String
	visibility: String
	settled: Boolean
}
